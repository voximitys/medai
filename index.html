<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#1a1a17;
  --bg2:#222220;
  --bg3:#2c2c28;
  --border:#333330;
  --border2:#3d3d38;
  --text:#e8e8e3;
  --text2:#a0a098;
  --text3:#606058;
  --accent:#d4956a;
  --user-bg:#272724;
  --radius:16px;
  --font:   'Outfit',sans-serif;
  --serif:  'Cormorant Garamond',serif;
  --mono:   'DM Mono',monospace;
}

html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-weight:300;font-size:15px;line-height:1.6}

/* ── LAYOUT ───────────────────────────────── */
#app{
  display:flex;flex-direction:column;
  height:100vh;max-width:820px;margin:0 auto;position:relative;
}

/* ── HEADER ───────────────────────────────── */
#header{
  position:absolute;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
}
.icon-btn{
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:7px;border-radius:9px;display:flex;align-items:center;
  transition:color .18s,background .18s;
}
.icon-btn:hover{color:var(--text);background:var(--bg3)}
.icon-btn svg{width:18px;height:18px}

/* ── WELCOME ─────────────────────────────── */
#welcome{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:44px;padding:0 24px;
  transition:opacity .25s;
}
#welcome.hidden{display:none}

.greeting{display:flex;align-items:center;gap:14px}
.ast{
  color:var(--accent);font-size:36px;line-height:1;
  animation:spin 24s linear infinite;display:inline-block;
}
@keyframes spin{to{transform:rotate(360deg)}}

.greeting-text{
  font-family:var(--serif);font-size:clamp(34px,5.5vw,58px);
  font-weight:300;letter-spacing:-.3px;
}

.qa:hover{border-color:var(--border2);color:var(--text);background:var(--bg2)}
.qa svg{flex-shrink:0}

/* ── MESSAGES ────────────────────────────── */
#messages{
  flex:1;overflow-y:auto;
  padding:72px 18px 16px;
  display:flex;flex-direction:column;gap:22px;
  scroll-behavior:smooth;
}
#messages.hidden{display:none}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg{display:flex;gap:10px;animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.msg.user{justify-content:flex-end}
.msg.user .msg-content{
  background:var(--user-bg);border:1px solid var(--border);
  border-radius:18px 18px 4px 18px;
  padding:11px 15px;max-width:76%;
  white-space:pre-wrap;word-break:break-word;
}

.msg.assistant .msg-bubble{max-width:88%;display:flex;flex-direction:column;gap:4px}

.msg-provider{
  font-size:11px;color:var(--text3);
  display:flex;align-items:center;gap:5px;padding-left:2px;margin-bottom:2px;
}
.pdot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

.msg.assistant .msg-content{padding:0;line-height:1.72;word-break:break-word}

/* markdown */
.msg-content p{margin:0 0 10px}
.msg-content p:last-child{margin:0}
.msg-content strong{font-weight:600;color:var(--text)}
.msg-content em{font-style:italic}
.msg-content h1,.msg-content h2,.msg-content h3{
  font-family:var(--serif);font-weight:400;margin:14px 0 6px
}
.msg-content h1{font-size:26px}
.msg-content h2{font-size:21px}
.msg-content h3{font-size:17px}
.msg-content ul,.msg-content ol{padding-left:20px;margin:8px 0}
.msg-content li{margin:4px 0}
.msg-content blockquote{
  border-left:2px solid var(--accent);padding-left:12px;
  color:var(--text2);margin:8px 0;font-style:italic;
}
.msg-content a{color:var(--accent);text-decoration:none}
.msg-content a:hover{text-decoration:underline}
.msg-content hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.msg-content code{
  font-family:var(--mono);font-size:12.5px;
  background:var(--bg3);padding:1px 5px;border-radius:4px;color:#e8a87c;
}
.msg-content pre{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:11px;padding:14px 16px;
  overflow-x:auto;margin:10px 0;position:relative;
}
.msg-content pre code{
  background:none;padding:0;color:var(--text);
  font-size:12.5px;line-height:1.6;
}
.copy-code{
  position:absolute;top:8px;right:8px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);padding:3px 9px;border-radius:6px;
  font-size:11px;cursor:pointer;font-family:var(--font);
  transition:all .18s;
}
.copy-code:hover{background:var(--border);color:var(--text)}

/* thinking */
.thinking{
  display:flex;align-items:center;gap:7px;
  color:var(--text3);font-size:13px;padding:6px 0;
}
.dots span{
  display:inline-block;width:4px;height:4px;
  background:var(--text3);border-radius:50%;
  animation:blink 1.3s ease infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}

/* error msg */
.err-bubble{
  color:#e07070;font-size:13px;
  padding:8px 12px;background:rgba(224,112,112,.08);
  border-radius:10px;border:1px solid rgba(224,112,112,.2);
  font-family:var(--mono);
}

/* ── INPUT AREA ──────────────────────────── */
#input-area{padding:10px 18px 22px;position:relative;flex-shrink:0}

#input-box{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:18px;padding:13px 15px 11px;
  display:flex;flex-direction:column;gap:9px;
  transition:border-color .2s;
}
#input-box:focus-within{border-color:var(--border2)}

#ta{
  background:none;border:none;outline:none;
  color:var(--text);font-family:var(--font);font-size:15px;
  font-weight:300;resize:none;min-height:22px;max-height:180px;
  line-height:1.55;caret-color:var(--accent);width:100%;
}
#ta::placeholder{color:var(--text3)}

.toolbar{display:flex;align-items:center;justify-content:space-between}
.tb-l{display:flex;gap:3px;align-items:center}
.tb-r{display:flex;align-items:center;gap:7px}

.tb-btn{
  background:none;border:none;color:var(--text3);cursor:pointer;
  padding:5px;border-radius:7px;display:flex;align-items:center;
  transition:all .18s;
}
.tb-btn:hover{color:var(--text2);background:var(--bg3)}
.tb-btn svg{width:15px;height:15px}

/* model picker */
#mpick{
  background:none;border:none;color:var(--text2);cursor:pointer;
  font-family:var(--font);font-size:12.5px;font-weight:400;
  display:flex;align-items:center;gap:5px;
  padding:4px 7px;border-radius:8px;transition:all .18s;
}
#mpick:hover{background:var(--bg3);color:var(--text)}
#mpick .pdot{transition:background .2s}
.chevron{width:11px;height:11px;transition:transform .18s;flex-shrink:0;opacity:.6}
.chevron.open{transform:rotate(180deg)}

/* no-key warning */
.nokey{
  display:none;align-items:center;gap:5px;
  font-size:12px;color:#d4945a;
}
.nokey button{
  background:none;border:none;color:inherit;cursor:pointer;
  text-decoration:underline;font-size:inherit;font-family:inherit;
}

/* send */
#send{
  background:var(--text2);border:none;color:var(--bg);
  width:28px;height:28px;border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;flex-shrink:0;
}
#send:hover{background:var(--text)}
#send:disabled{opacity:.28;cursor:default}
#send svg{width:13px;height:13px}

/* ── MODEL DROPDOWN ──────────────────────── */
#mdd{
  position:absolute;bottom:calc(100% + 6px);right:18px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;width:272px;max-height:400px;
  overflow-y:auto;z-index:200;display:none;
  box-shadow:0 8px 36px rgba(0,0,0,.5);
}
#mdd.open{display:block;animation:dropUp .14s ease}
@keyframes dropUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
#mdd::-webkit-scrollbar{width:3px}
#mdd::-webkit-scrollbar-thumb{background:var(--border)}

.psec{padding:6px}
.psec+.psec{border-top:1px solid var(--border)}
.plabel{
  font-size:10px;font-weight:500;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text3);
  padding:6px 9px 3px;
}
.mopt{
  display:flex;align-items:center;gap:8px;
  padding:7px 9px;border-radius:8px;cursor:pointer;
  font-size:13px;color:var(--text2);transition:all .14s;
}
.mopt:hover{background:var(--bg3);color:var(--text)}
.mopt.active{background:var(--bg3);color:var(--text)}
.mbadge{
  margin-left:auto;font-size:10px;
  background:var(--bg3);color:var(--text3);
  padding:1px 5px;border-radius:4px;
}
.mopt.active .mbadge{background:rgba(212,149,106,.15);color:var(--accent)}

/* ── SETTINGS MODAL ──────────────────────── */
#sov{
  position:fixed;inset:0;z-index:300;
  display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(5px);
}
#sov.open{display:flex}

#smod{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:20px;width:490px;max-width:calc(100vw - 32px);
  max-height:calc(100vh - 64px);overflow-y:auto;padding:26px 28px;
}
#smod::-webkit-scrollbar{width:3px}
#smod::-webkit-scrollbar-thumb{background:var(--border)}

.sh{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:20px;
}
.st{font-family:var(--serif);font-size:24px;font-weight:300}

.sinfo{
  font-size:13px;color:var(--text2);margin-bottom:20px;
  line-height:1.5;padding:10px 12px;
  background:rgba(212,149,106,.06);border-radius:10px;
  border:1px solid rgba(212,149,106,.15);
}

.ssec{margin-bottom:6px}
.ssep{border:none;border-top:1px solid var(--border);margin:14px 0}

.sslabel{
  font-size:10px;font-weight:500;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text3);
  margin-bottom:9px;display:flex;align-items:center;gap:6px;
}
.sslabel a{
  margin-left:auto;font-size:10px;color:var(--text3);
  text-decoration:none;letter-spacing:0;font-weight:400;
  text-transform:none;
}
.sslabel a:hover{color:var(--text2)}

.kiw{display:flex;gap:7px;align-items:center}
.ki{
  flex:1;background:var(--bg3);border:1px solid var(--border);
  border-radius:9px;padding:8px 12px;color:var(--text);
  font-family:var(--mono);font-size:12px;outline:none;
  transition:border-color .2s;
}
.ki:focus{border-color:var(--accent)}
.ki::placeholder{font-family:var(--font);color:var(--text3)}

.savebtn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);padding:8px 12px;border-radius:9px;
  cursor:pointer;font-size:12px;transition:all .18s;white-space:nowrap;
  font-family:var(--font);
}
.savebtn:hover{background:var(--border2);color:var(--text)}

.kst{font-size:11px;color:var(--text3);margin-top:4px;min-height:16px}
.kst.ok{color:#6bbf8a}

.sclosebtn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:10px 18px;border-radius:10px;
  cursor:pointer;font-family:var(--font);font-size:13px;
  margin-top:20px;width:100%;transition:all .18s;
}
.sclosebtn:hover{background:var(--border2)}

/* name input in settings */
.name-row{margin-bottom:20px}
.name-input{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:9px;padding:8px 12px;color:var(--text);
  font-family:var(--font);font-size:14px;outline:none;width:100%;
  transition:border-color .2s;
}
.name-input:focus{border-color:var(--accent)}
.name-input::placeholder{color:var(--text3)}

</style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div style="display:flex;gap:6px">
      <button class="icon-btn" onclick="newChat()" title="New conversation">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <button class="icon-btn" onclick="openSettings()" title="API Keys & Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </div>

  <!-- WELCOME -->
  <div id="welcome">
    <div class="greeting">
      <span class="ast">✳</span>
      <span class="greeting-text" id="gtext">Hello there</span>
    </div>

  <!-- CHAT MESSAGES -->
  <div id="messages" class="hidden"></div>

  <!-- INPUT -->
  <div id="input-area">
    <div id="input-box">
      <textarea id="ta" rows="1" placeholder="Message…"
        oninput="resize(this);updateSend()"
        onkeydown="kd(event)"></textarea>
      <div class="toolbar">
        <div class="tb-l">
          <button class="tb-btn" title="Attach file (coming soon)" onclick="alert('File attachment coming soon!')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
        </div>
        <div class="tb-r">
          <span class="nokey" id="nokey">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            No API key — <button onclick="openSettings()">add one</button>
          </span>
          <button id="mpick" onclick="toggleMdd()">
            <span class="pdot" id="pdot" style="width:6px;height:6px;border-radius:50%"></span>
            <span id="mlabel">Sonnet 4.6</span>
            <svg class="chevron" id="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <button id="send" onclick="send()" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </div>
    </div>
    <!-- Model Dropdown -->
    <div id="mdd"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="sov" onclick="sovClick(event)">
  <div id="smod">
    <div class="sh">
      <span class="st">Settings</span>
      <button class="icon-btn" onclick="closeSettings()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="name-row">
      <div class="sslabel" style="margin-bottom:7px">Your name (for greeting)</div>
      <input class="name-input" id="nameInput" type="text" placeholder="Enter your name…" oninput="saveName(this.value)">
    </div>

    <hr class="ssep">

    <div class="sinfo">🔒 API keys are stored only in your browser's localStorage — never transmitted anywhere except directly to each provider's API endpoint.</div>

    <div id="keyform"></div>

    <button class="sclosebtn" onclick="closeSettings()">Done</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// PROVIDERS & MODELS
// ══════════════════════════════════════════
const P = {
  claude:{
    name:'Claude',color:'#D4956A',
    ph:'sk-ant-api03-…',
    link:'https://console.anthropic.com/settings/keys',
    models:[
      {id:'claude-opus-4-6',         label:'Opus 4.6'},
      {id:'claude-sonnet-4-6',       label:'Sonnet 4.6'},
      {id:'claude-sonnet-4-6-ext',   label:'Sonnet 4.6 Extended', ext:true},
      {id:'claude-haiku-4-5-20251001',label:'Haiku 4.5'},
      {id:'claude-opus-4-5',         label:'Opus 4.5'},
    ]
  },
  openai:{
    name:'ChatGPT',color:'#19C37D',
    ph:'sk-proj-…',
    link:'https://platform.openai.com/api-keys',
    models:[
      {id:'gpt-4o',        label:'GPT-4o'},
      {id:'gpt-4o-mini',   label:'GPT-4o Mini'},
      {id:'o1',            label:'o1'},
      {id:'o1-mini',       label:'o1 Mini'},
      {id:'o3',            label:'o3'},
      {id:'o3-mini',       label:'o3 Mini'},
      {id:'o4-mini',       label:'o4 Mini'},
      {id:'gpt-4-turbo',   label:'GPT-4 Turbo'},
    ]
  },
  gemini:{
    name:'Gemini',color:'#4285F4',
    ph:'AIzaSy…',
    link:'https://aistudio.google.com/app/apikey',
    models:[
      {id:'gemini-2.5-pro-preview-03-25',         label:'2.5 Pro'},
      {id:'gemini-2.0-flash',                     label:'2.0 Flash'},
      {id:'gemini-2.0-flash-thinking-exp-01-21',  label:'2.0 Flash Thinking',ext:true},
      {id:'gemini-1.5-pro',                       label:'1.5 Pro'},
      {id:'gemini-1.5-flash',                     label:'1.5 Flash'},
    ]
  },
  grok:{
    name:'Grok',color:'#E8E8E8',
    ph:'xai-…',
    link:'https://console.x.ai/',
    models:[
      {id:'grok-3',        label:'Grok 3'},
      {id:'grok-3-mini',   label:'Grok 3 Mini'},
      {id:'grok-2',        label:'Grok 2'},
      {id:'grok-2-vision', label:'Grok 2 Vision'},
    ]
  },
  deepseek:{
    name:'DeepSeek',color:'#4D6BFE',
    ph:'sk-…',
    link:'https://platform.deepseek.com/api_keys',
    models:[
      {id:'deepseek-chat',     label:'DeepSeek V3'},
      {id:'deepseek-reasoner', label:'DeepSeek R1',ext:true},
    ]
  }
};

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let S = {
  msgs:[],
  prov:'claude',
  mid:'claude-sonnet-4-6',
  busy:false,
};

let keys = (() => {
  try { return JSON.parse(localStorage.getItem('aichat_keys')||'{}'); } catch{ return {}; }
})();

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
function init(){
  const h = new Date().getHours();
  const name = localStorage.getItem('aichat_name')||'';
  const g = h<12?'Morning':h<17?'Afternoon':'Evening';
  document.getElementById('gtext').textContent = name ? `${g}, ${name}` : `${g} there`;
  renderMdd(); updatePickerBtn(); updateSend(); checkNoKey();
}

// ══════════════════════════════════════════
// NAME
// ══════════════════════════════════════════
function saveName(v){
  localStorage.setItem('aichat_name', v.trim());
  init();
}

// ══════════════════════════════════════════
// KEY HELPERS
// ══════════════════════════════════════════
function getKey(p){ return keys[p]||''; }
function setKey(p,v){ keys[p]=v.trim(); localStorage.setItem('aichat_keys',JSON.stringify(keys)); }

// ══════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════
function buildKeyForm(){
  document.getElementById('nameInput').value = localStorage.getItem('aichat_name')||'';
  document.getElementById('keyform').innerHTML = Object.entries(P).map(([pid,p],i,arr)=>`
    ${i>0?'<hr class="ssep">':''}
    <div class="ssec">
      <div class="sslabel">
        <span class="pdot" style="background:${p.color}"></span>
        ${p.name}
        <a href="${p.link}" target="_blank">Get key ↗</a>
      </div>
      <div class="kiw">
        <input class="ki" id="k_${pid}" type="password"
          placeholder="${p.ph}" value="${getKey(pid)}"
          onkeydown="if(event.key==='Enter')saveKey('${pid}')">
        <button class="savebtn" onclick="saveKey('${pid}')">Save</button>
      </div>
      <div class="kst ${getKey(pid)?'ok':''}" id="ks_${pid}">${getKey(pid)?'✓ Saved':''}</div>
    </div>
  `).join('');
}

function saveKey(pid){
  const v = document.getElementById(`k_${pid}`).value;
  setKey(pid,v);
  const el = document.getElementById(`ks_${pid}`);
  el.className = `kst ${v.trim()?'ok':''}`;
  el.textContent = v.trim()?'✓ Saved':'';
  checkNoKey();
}

function openSettings(){ buildKeyForm(); document.getElementById('sov').classList.add('open'); }
function closeSettings(){ document.getElementById('sov').classList.remove('open'); checkNoKey(); }
function sovClick(e){ if(e.target===document.getElementById('sov')) closeSettings(); }

function checkNoKey(){
  const has = !!getKey(S.prov);
  const el = document.getElementById('nokey');
  if(el) el.style.display = has?'none':'flex';
}

// ══════════════════════════════════════════
// MODEL DROPDOWN
// ══════════════════════════════════════════
function renderMdd(){
  document.getElementById('mdd').innerHTML = Object.entries(P).map(([pid,p])=>`
    <div class="psec">
      <div class="plabel">${p.name}</div>
      ${p.models.map(m=>`
        <div class="mopt ${S.prov===pid&&S.mid===m.id?'active':''}"
          onclick="pickModel('${pid}','${m.id}')">
          <span style="width:6px;height:6px;border-radius:50%;background:${p.color};display:inline-block;flex-shrink:0"></span>
          ${m.label}
          ${m.ext?'<span class="mbadge">Extended</span>':''}
        </div>
      `).join('')}
    </div>
  `).join('');
}

function pickModel(pid,mid){
  S.prov=pid; S.mid=mid;
  renderMdd(); updatePickerBtn(); closeMdd(); checkNoKey();
}

function updatePickerBtn(){
  const p = P[S.prov];
  const m = p.models.find(x=>x.id===S.mid)||{label:S.mid};
  document.getElementById('pdot').style.background = p.color;
  document.getElementById('mlabel').textContent = m.label;
}

function toggleMdd(){
  const dd = document.getElementById('mdd');
  const isOpen = dd.classList.toggle('open');
  document.getElementById('chev').classList.toggle('open',isOpen);
  if(isOpen) setTimeout(()=>document.addEventListener('click',mddOutside,{once:true}),0);
}
function closeMdd(){
  document.getElementById('mdd').classList.remove('open');
  document.getElementById('chev').classList.remove('open');
}
function mddOutside(e){
  const dd=document.getElementById('mdd'), btn=document.getElementById('mpick');
  if(!dd.contains(e.target)&&!btn.contains(e.target)) closeMdd();
}

// ══════════════════════════════════════════
// TEXTAREA
// ══════════════════════════════════════════
function resize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,180)+'px';
}
function updateSend(){
  const v = document.getElementById('ta').value.trim();
  document.getElementById('send').disabled = !v||S.busy;
}
function kd(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); }
}
function fill(t){
  const ta=document.getElementById('ta');
  ta.value=t; ta.focus(); resize(ta); updateSend();
}
function surprise(){
  const p=[
    "What's a mind-blowing fact most people don't know?",
    "Give me a unique creative challenge for today",
    "What's the most elegant proof in mathematics?",
    "Explain something counterintuitive about physics",
    "What would you build if you had unlimited compute?",
    "Tell me something beautiful you find in nature",
    "What's an underrated book I should read this year?",
  ];
  fill(p[Math.floor(Math.random()*p.length)]);
}

// ══════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════
function newChat(){
  S.msgs=[];
  document.getElementById('messages').innerHTML='';
  document.getElementById('messages').classList.add('hidden');
  document.getElementById('welcome').classList.remove('hidden');
  const ta=document.getElementById('ta');
  ta.value=''; resize(ta); updateSend();
}

async function send(){
  const ta=document.getElementById('ta');
  const txt=ta.value.trim();
  if(!txt||S.busy) return;

  const key=getKey(S.prov);
  if(!key){ openSettings(); return; }

  // show chat view
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('messages').classList.remove('hidden');

  S.msgs.push({role:'user',content:txt});
  addMsg({role:'user',content:txt});
  ta.value=''; resize(ta);
  S.busy=true; updateSend();

  const thinkEl = addThinking();

  try{
    const reply = await callApi(S.msgs, S.prov, S.mid, key);
    thinkEl.remove();
    addMsg({role:'assistant',content:reply,prov:S.prov,mid:S.mid});
    S.msgs.push({role:'assistant',content:reply});
  } catch(err){
    thinkEl.remove();
    addErrMsg(err.message);
  }

  S.busy=false; updateSend(); scrollBot();
}

function addThinking(){
  const c=document.getElementById('messages');
  const el=document.createElement('div');
  el.className='msg assistant';
  el.innerHTML=`<div class="msg-bubble"><div class="thinking"><div class="dots"><span></span><span></span><span></span></div><span style="font-size:12px;color:var(--text3)">Thinking…</span></div></div>`;
  c.appendChild(el); scrollBot(); return el;
}

function addMsg({role,content,prov,mid}){
  const c=document.getElementById('messages');
  const el=document.createElement('div');
  el.className=`msg ${role}`;
  if(role==='user'){
    el.innerHTML=`<div class="msg-content">${esc(content)}</div>`;
  } else {
    const p2=prov?P[prov]:null;
    const m2=p2?p2.models.find(x=>x.id===mid):null;
    const provHtml=p2?`<div class="msg-provider"><span class="pdot" style="background:${p2.color}"></span>${p2.name}${m2?' · '+m2.label:''}</div>`:'';
    el.innerHTML=`<div class="msg-bubble">${provHtml}<div class="msg-content">${md(content)}</div></div>`;
  }
  c.appendChild(el);
  el.querySelectorAll('pre').forEach(pre=>{
    const btn=document.createElement('button');
    btn.className='copy-code'; btn.textContent='Copy';
    btn.onclick=()=>{
      navigator.clipboard.writeText(pre.querySelector('code')?.textContent||pre.textContent);
      btn.textContent='Copied!'; setTimeout(()=>btn.textContent='Copy',2000);
    };
    pre.style.position='relative'; pre.appendChild(btn);
  });
  scrollBot();
}

function addErrMsg(msg){
  const c=document.getElementById('messages');
  const el=document.createElement('div');
  el.className='msg assistant';
  el.innerHTML=`<div class="msg-bubble"><div class="err-bubble">Error: ${esc(msg)}</div></div>`;
  c.appendChild(el); scrollBot();
}

function scrollBot(){
  const c=document.getElementById('messages');
  c.scrollTop=c.scrollHeight;
}

// ══════════════════════════════════════════
// MARKDOWN
// ══════════════════════════════════════════
function esc(s){
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function md(raw){
  let t = String(raw);
  // fenced code blocks
  t = t.replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>`<pre><code class="lang-${esc(lang)}">${esc(code.trim())}</code></pre>`);
  // inline code
  t = t.replace(/`([^`\n]+)`/g,(_,c)=>`<code>${esc(c)}</code>`);
  // bold
  t = t.replace(/\*\*(.+?)\*\*/gs,'<strong>$1</strong>');
  // italic
  t = t.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g,'<em>$1</em>');
  // h3 h2 h1
  t = t.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  // blockquote
  t = t.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
  // hr
  t = t.replace(/^---$/gm,'<hr>');
  // links
  t = t.replace(/\[(.+?)\]\((https?:\/\/.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  // lists
  t = t.replace(/((?:^[\-\*] .+$\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l=>`<li>${l.replace(/^[\-\*] /,'')}</li>`).join('');
    return `<ul>${items}</ul>`;
  });
  t = t.replace(/((?:^\d+\. .+$\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l=>`<li>${l.replace(/^\d+\. /,'')}</li>`).join('');
    return `<ol>${items}</ol>`;
  });
  // paragraphs
  const blocks = t.split(/\n{2,}/);
  t = blocks.map(b=>{
    b = b.trim();
    if(!b) return '';
    if(/^<(h[1-3]|ul|ol|pre|blockquote|hr|p)/.test(b)) return b;
    return `<p>${b.replace(/\n/g,'<br>')}</p>`;
  }).join('\n');
  return t;
}

// ══════════════════════════════════════════
// API CALLS
// ══════════════════════════════════════════
async function callApi(msgs, prov, mid, key){
  switch(prov){
    case 'claude':   return apiClaude(msgs, mid, key);
    case 'openai':   return apiOAI(msgs, mid, key, 'https://api.openai.com/v1/chat/completions');
    case 'gemini':   return apiGemini(msgs, mid, key);
    case 'grok':     return apiOAI(msgs, mid, key, 'https://api.x.ai/v1/chat/completions');
    case 'deepseek': return apiOAI(msgs, mid, key, 'https://api.deepseek.com/v1/chat/completions');
    default: throw new Error('Unknown provider');
  }
}

// ── Claude ──────────────────────────────
async function apiClaude(msgs, mid, key){
  const isExt = mid.endsWith('-ext');
  const realMid = isExt ? mid.replace('-ext','') : mid;

  const body = {
    model: realMid,
    max_tokens: isExt ? 16000 : 8096,
    messages: msgs.map(m=>({role:m.role, content:m.content})),
  };
  if(isExt) body.thinking = { type:'enabled', budget_tokens:10000 };

  const r = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true',
    },
    body: JSON.stringify(body),
  });
  if(!r.ok){
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error?.message || `HTTP ${r.status}: ${r.statusText}`);
  }
  const d = await r.json();
  return d.content.filter(b=>b.type==='text').map(b=>b.text).join('');
}

// ── OpenAI-compatible (OpenAI / Grok / DeepSeek) ──
async function apiOAI(msgs, mid, key, url){
  const body = {
    model: mid,
    messages: msgs.map(m=>({role:m.role, content:m.content})),
  };
  // reasoning models don't take max_tokens
  const noMaxTokens = ['o1','o1-mini','o3','o3-mini','o4-mini'];
  if(!noMaxTokens.includes(mid)) body.max_tokens = 4096;

  const r = await fetch(url,{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${key}`,
    },
    body: JSON.stringify(body),
  });
  if(!r.ok){
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error?.message || `HTTP ${r.status}: ${r.statusText}`);
  }
  const d = await r.json();
  return d.choices?.[0]?.message?.content || '';
}

// ── Gemini ───────────────────────────────
async function apiGemini(msgs, mid, key){
  // Gemini doesn't allow consecutive same-role turns;
  // merge if needed and handle system context
  const contents = [];
  for(const m of msgs){
    const role = m.role==='assistant'?'model':'user';
    if(contents.length && contents[contents.length-1].role===role){
      contents[contents.length-1].parts[0].text += '\n\n' + m.content;
    } else {
      contents.push({ role, parts:[{text:m.content}] });
    }
  }

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${mid}:generateContent?key=${key}`;
  const r = await fetch(url,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ contents, generationConfig:{ maxOutputTokens:4096 } }),
  });
  if(!r.ok){
    const e = await r.json().catch(()=>({}));
    throw new Error(e.error?.message || `HTTP ${r.status}: ${r.statusText}`);
  }
  const d = await r.json();
  return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
}
