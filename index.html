    }

    /* ============================================================
       Wire-up
       ============================================================ */
    function resizeInput() {
      const ta = refs.input;
      ta.style.height = "auto";
      ta.style.height = Math.min(ta.scrollHeight, 200) + "px";
      refs.sendBtn.disabled = state.streaming ? false : ta.value.trim().length === 0;
    }

    function bindEvents() {
      // Sidebar toggle (collapse on desktop, slide on mobile)
      const isMobile = () => window.matchMedia("(max-width: 768px)").matches;
      refs.toggleSidebar.addEventListener("click", () => {
        if (isMobile()) {
          refs.sidebar.classList.remove("mobile-open");
          refs.mobileOverlay.classList.remove("show");
          refs.openSidebar.classList.remove("hidden");
        } else {
          // Desktop collapse — also shrink the grid column so the chat area expands.
          const willCollapse = !refs.sidebar.classList.contains("collapsed");
          refs.sidebar.classList.toggle("collapsed", willCollapse);
          refs.app.classList.toggle("sidebar-collapsed", willCollapse);
          refs.openSidebar.classList.toggle("hidden", !willCollapse);
        }
      });
      refs.openSidebar.addEventListener("click", () => {
        if (isMobile()) {
          refs.sidebar.classList.add("mobile-open");
          refs.mobileOverlay.classList.add("show");
          refs.openSidebar.classList.add("hidden");
        } else {
          // Desktop expand — restore grid column.
          refs.sidebar.classList.remove("collapsed");
          refs.app.classList.remove("sidebar-collapsed");
          refs.openSidebar.classList.add("hidden");
        }
      });
      refs.mobileOverlay.addEventListener("click", () => {
        refs.sidebar.classList.remove("mobile-open");
        refs.mobileOverlay.classList.remove("show");
      });

      refs.newChat.addEventListener("click", newChat);
      refs.searchChats.addEventListener("click", () => {
        const q = prompt("Search chats:");
        if (q == null) return;
        const ql = q.toLowerCase();
        const hit = state.chats.find(c =>
          (c.title || "").toLowerCase().includes(ql) ||
          (c.messages || []).some(m => (m.content || "").toLowerCase().includes(ql))
        );
        if (hit) openChat(hit.id); else toast("No matches.", "error");
      });

      refs.modelPill.addEventListener("click", (e) => {
        e.stopPropagation();
        if (refs.modelMenu.classList.contains("open")) closeModelMenu();
        else openModelMenu();
      });
      document.addEventListener("click", (e) => {
        if (!refs.modelMenu.contains(e.target) && !refs.modelPill.contains(e.target)) closeModelMenu();
      });

      // input
      refs.input.addEventListener("input", resizeInput);
      refs.input.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
          e.preventDefault();
          sendMessage();
        }
      });
      refs.sendBtn.addEventListener("click", sendMessage);

      // toggles
      refs.thinkBtn.addEventListener("click", () => {
        if (refs.thinkBtn.disabled) return;
        state.think = !state.think;
        refs.thinkBtn.classList.toggle("active", state.think);
      });
      refs.searchBtn.addEventListener("click", () => {
        if (refs.searchBtn.disabled) return;
        state.search = !state.search;
        refs.searchBtn.classList.toggle("active", state.search);
      });

      // download
      refs.downloadBtn.addEventListener("click", downloadCurrentChat);

      // settings
      refs.settingsBtn.addEventListener("click", () => openSettings("keys"));
      refs.openSettings.addEventListener("click", (e) => { e.preventDefault(); openSettings("keys"); });
      $$('[data-close-modal]').forEach(b => b.addEventListener("click", closeSettings));
      refs.saveBtn.addEventListener("click", saveSettings);
      $$(".settings-tab").forEach(t => t.addEventListener("click", () => {
        const tab = t.dataset.tab;
        $$(".settings-tab").forEach(x => x.classList.toggle("active", x === t));
        $$(".settings-section").forEach(s => s.classList.toggle("active", s.dataset.section === tab));
      }));


      // user chip → open settings
      $("#user-chip").addEventListener("click", () => openSettings("general"));

      // close model menu / modal on Esc
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeModelMenu();
          closeSettings();
        }
      });

      // open-sidebar visibility — show on mobile OR when sidebar is collapsed on desktop.
      const mq = window.matchMedia("(max-width: 768px)");
      const updateSidebarBtn = () => {
        const collapsed = refs.sidebar.classList.contains("collapsed");
        refs.openSidebar.classList.toggle("hidden", !(mq.matches || collapsed));
      };
      updateSidebarBtn();
      mq.addEventListener("change", (e) => {
        // Reset transient sidebar state when crossing the breakpoint, so we don't
        // get stuck (e.g. sidebar `display: none` from desktop collapse showing as
        // hidden in mobile view).
        if (e.matches) {
          refs.sidebar.classList.remove("collapsed");
          refs.app.classList.remove("sidebar-collapsed");
        } else {
          refs.sidebar.classList.remove("mobile-open");
          refs.mobileOverlay.classList.remove("show");
        }
        updateSidebarBtn();
      });
    }

    function boot() {
      // Welcome / first-run hint
      const keys = store.getKeys();
      const hasAnyKey = Object.keys(keys).length > 0;

      // user chip
      refs.userName.textContent = state.settings.name || "You";
      refs.userAvatar.textContent = (state.settings.name || "U").trim().slice(0, 2).toUpperCase();

      // pick a model
      setModel(state.currentModelId || state.settings.defaultModel || "claude-sonnet-4-6");

      // if active chat is gone, clear
      if (state.activeId && !getChat(state.activeId)) {
        state.activeId = null; store.setActive(null);
      }

      renderChatList();
      renderMessages();
      bindEvents();
      resizeInput();

      if (!hasAnyKey) {
        setTimeout(() => {
          toast("Add API keys in Settings to start chatting.", "info", 5500);
        }, 600);
      }
    }

    document.addEventListener("DOMContentLoaded", boot);
  </script>
</body>
